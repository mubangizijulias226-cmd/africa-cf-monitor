<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoJo Reading Adventure</title>
  <style>
    :root {
      --bg: #fff8ef;
      --card: #ffffff;
      --ink: #2b2b44;
      --accent: #ff7a59;
      --accent-2: #3a86ff;
      --ok: #2a9d8f;
      --warn: #f4a261;
      --shadow: rgba(35, 45, 78, 0.15);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Comic Sans MS", "Segoe UI", Arial, sans-serif; background: radial-gradient(circle at top left, #fff2cc, var(--bg)); color: var(--ink); min-height: 100vh; }
    .container { max-width: 960px; margin: 0 auto; padding: 20px 14px 28px; }
    .hero { text-align: center; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px var(--shadow); }
    h1 { margin: 0; font-size: clamp(1.6rem, 3vw, 2.4rem); }
    .subtitle { margin: 10px 0 0; color: #5a5d75; }
    .layout { margin-top: 16px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    .card { background: var(--card); border-radius: 18px; box-shadow: 0 8px 20px var(--shadow); padding: 16px; }
    .word-box { font-size: clamp(2rem, 7vw, 3.4rem); text-align: center; padding: 16px; border-radius: 16px; background: #f3f7ff; margin-bottom: 12px; letter-spacing: 2px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
    button { border: none; border-radius: 12px; padding: 10px 13px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .speak { background: var(--accent-2); color: white; }
    .next { background: var(--accent); color: white; }
    .check { background: var(--ok); color: white; }
    .hint { background: #ece9ff; color: #4a3ca3; }
    input[type="text"] { width: 100%; margin: 10px 0; border-radius: 12px; border: 2px solid #dadcf0; padding: 11px; font-size: 1.1rem; }
    .feedback { min-height: 30px; font-weight: bold; padding: 8px; border-radius: 10px; background: #f9f8ff; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
    .stat { background: #f6fff7; border-radius: 12px; padding: 10px; text-align: center; font-weight: 700; }
    .story { margin-top: 12px; font-size: 1.1rem; line-height: 1.6; background: #fffdf7; border-left: 6px solid var(--warn); border-radius: 10px; padding: 10px; }
    .letter-buttons { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 6px; margin-top: 12px; }
    .letter-buttons button { padding: 10px 0; background: #e8f6ff; color: #194d74; border: 2px solid #cbeaff; font-size: 1rem; font-weight: 800; }
    .family-box { margin: 12px 0 10px; padding: 10px; border: 2px dashed #ffce7f; border-radius: 12px; background: #fff7e8; }
    .family-box p { margin: 0 0 8px; font-weight: 700; }
    .family-box button { background: #ffd166; color: #5f4203; }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>📚 JoJo Reading Adventure</h1>
      <p class="subtitle">A playful reading helper for a Primary 2 learner in Uganda (about age 7).</p>
    </section>

    <section class="layout">
      <article class="card">
        <h2>Welcome Chat</h2>
        <div class="family-box">
          <p>Tap and read these family greetings:</p>
          <div class="btn-row">
            <button class="hint greet-btn">How is Jayden?</button>
            <button class="hint greet-btn">How is Jadon?</button>
            <button class="hint greet-btn">How is Janyo?</button>
            <button class="hint greet-btn">How is Mumy Obino?</button>
          </div>
        </div>

        <h2>1) Read the Word</h2>
        <div id="wordBox" class="word-box">sun</div>
        <div class="btn-row">
          <button class="speak" id="speakWord">🔊 Say Word (Slow)</button>
          <button class="hint" id="sayLetters">🔡 Say Letters (Slow)</button>
          <button class="next" id="nextWord">➡️ New Word</button>
        </div>

        <h3>2) Type what you read</h3>
        <input id="answerInput" type="text" placeholder="Type the word here" autocomplete="off" />
        <div class="btn-row"><button class="check" id="checkAnswer">✅ Check Answer</button></div>
        <p id="feedback" class="feedback"></p>

        <div class="stats">
          <div class="stat">⭐ Score: <span id="score">0</span></div>
          <div class="stat">🔥 Streak: <span id="streak">0</span></div>
        </div>

        <div class="story" id="storyText"></div>
      </article>

      <aside class="card">
        <h2>Sound Practice</h2>
        <p>Tap letters to hear sounds and build confidence.</p>
        <div class="letter-buttons" id="letters"></div>
      </aside>
    </section>
  </div>

  <script>
    const words = ["sun", "cat", "book", "tree", "fish", "milk", "rain", "home", "school", "friend", "water", "happy", "play", "read", "write", "smile", "chair", "phone", "mango", "banana"];
    const storyTemplates = [
      'JoJo can read the word "{word}". She smiles and says it loudly!',
      'At school, JoJo sees "{word}" and reads it with confidence.',
      'JoJo reads "{word}" to mummy, and mummy claps for her.',
      'Today JoJo learned "{word}". Great job, star reader!'
    ];

    let currentWord = "sun";
    let score = 0;
    let streak = 0;

    const wordBox = document.getElementById("wordBox");
    const answerInput = document.getElementById("answerInput");
    const feedback = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const storyText = document.getElementById("storyText");

    function chooseClearVoice() {
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v => /en-GB|en-US/i.test(v.lang) && /female|samantha|zira|google uk english female/i.test(v.name));
      return preferred || voices.find(v => /en/i.test(v.lang)) || null;
    }

    function speak(text, mode = "word") {
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = mode === "letters" ? 0.45 : 0.52;
      utter.pitch = 1.0;
      utter.volume = 1;
      const chosen = chooseClearVoice();
      if (chosen) utter.voice = chosen;
      speechSynthesis.speak(utter);
    }

    function randomWord() {
      currentWord = words[Math.floor(Math.random() * words.length)];
      wordBox.textContent = currentWord;
      answerInput.value = "";
      feedback.textContent = "Try reading and typing the word.";
      showStory();
    }

    function showStory() {
      const t = storyTemplates[Math.floor(Math.random() * storyTemplates.length)];
      storyText.textContent = "Mini Story: " + t.replace("{word}", currentWord);
    }

    function checkAnswer() {
      const guess = answerInput.value.trim().toLowerCase();
      if (!guess) { feedback.textContent = "Please type the word first."; return; }

      if (guess === currentWord.toLowerCase()) {
        score += 10;
        streak += 1;
        feedback.textContent = `Excellent JoJo! "${currentWord}" is correct! 🎉`;
        speak("Excellent! You are correct.");
      } else {
        streak = 0;
        feedback.textContent = `Good try! The word is "${currentWord}". Let's read it together.`;
        speak(`Good try. The word is ${currentWord}`);
      }
      scoreEl.textContent = score;
      streakEl.textContent = streak;
    }

    document.getElementById("speakWord").addEventListener("click", () => speak(currentWord, "word"));
    document.getElementById("sayLetters").addEventListener("click", () => speak(currentWord.split("").join(" ... "), "letters"));
    document.getElementById("nextWord").addEventListener("click", randomWord);
    document.getElementById("checkAnswer").addEventListener("click", checkAnswer);
    answerInput.addEventListener("keydown", e => { if (e.key === "Enter") checkAnswer(); });

    document.querySelectorAll(".greet-btn").forEach(btn => {
      btn.addEventListener("click", () => speak(btn.textContent, "word"));
    });

    const lettersHolder = document.getElementById("letters");
    "abcdefghijklmnopqrstuvwxyz".split("").forEach(letter => {
      const b = document.createElement("button");
      b.textContent = letter;
      b.addEventListener("click", () => speak(letter, "letters"));
      lettersHolder.appendChild(b);
    });

    speechSynthesis.onvoiceschanged = () => {};
    randomWord();
  </script>
</body>
</html>
