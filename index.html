<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNCF Financial Monitoring System</title>
  <style>
    :root {
      --bg:#eef2f7;--card:#fff;--ink:#2a3950;--muted:#6c7a8b;--brand:#063a70;--cyan:#06a9e0;--line:#d8e0ea;
      --ok:#17a673;--warn:#f59f00;--bad:#d6336c;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    .topbar{background:var(--brand);color:#fff;padding:16px 24px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .container{max-width:1280px;margin:0 auto;padding:20px}
    .hero{background:var(--card);border-radius:18px;padding:20px;box-shadow:0 6px 24px rgba(0,0,0,.08);margin-bottom:16px}
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0}
    .tab{padding:12px 16px;border:1px solid var(--line);background:#f8fbff;border-radius:10px;cursor:pointer;font-weight:600}
    .tab.active{background:#e6f5ff;border-color:#9adfff;color:#0077b6}
    .panel{display:none}.panel.active{display:block}
    .filters{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:10px;background:var(--card);padding:14px;border-radius:14px;margin-bottom:14px}
    .hint{color:var(--muted);font-size:13px;margin:6px 0 0}
    @media(max-width:960px){.filters{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr 1fr}}
    @media(max-width:640px){.filters,.metrics{grid-template-columns:1fr}}
    select,button,input{padding:10px;border-radius:10px;border:1px solid var(--line);font-size:14px}
    button.primary{background:var(--cyan);color:#fff;border:none;font-weight:700;cursor:pointer}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
    .metric{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .metric h4{margin:0 0 8px;color:var(--muted);font-size:13px}
    .metric .v{font-size:25px;font-weight:700}
    .table-wrap{background:var(--card);border-radius:14px;padding:12px;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:9px;border-bottom:1px solid #eef3f8;text-align:left;white-space:nowrap}
    th{background:#f4f8fd;position:sticky;top:0}
  </style>
</head>
<body>
  <div class="topbar">
    <div>United Nations · Africa UNCF Monitoring (2023–2027)</div>
    <div id="meta">No data loaded</div>
  </div>

  <div class="container">
    <section class="hero">
      <h2 style="margin:0">Financial Monitoring and Results</h2>
      <p style="margin:6px 0 0;color:var(--muted)">Upload a CSV with the required UNCF columns to power all 4 sections.</p>
    </section>

    <div class="tabs" id="tabs"></div>

    <section class="filters" id="filters" style="display:none">
      <select id="country"></select>
      <select id="year"></select>
      <select id="status"></select>
      <select id="agency"></select>
      <button class="primary" id="download">Download Filtered CSV</button>
      <input type="file" id="upload" accept=".csv" />
      <button id="reset" type="button">Reset Filters</button>
    </section>
    <p class="hint" id="filterHint">Upload a dataset to activate filters and sections.</p>

    <section class="metrics" id="metrics"></section>

    <section class="panel active" data-panel="Overview">
      <div class="table-wrap"><table id="tableOverview"></table></div>
    </section>
    <section class="panel" data-panel="CF Analysis">
      <div class="table-wrap"><table id="tableCF"></table></div>
    </section>
    <section class="panel" data-panel="Thematic Analysis">
      <div class="table-wrap"><table id="tableTheme"></table></div>
    </section>
    <section class="panel" data-panel="Project Details">
      <div class="table-wrap"><table id="tableProject"></table></div>
    </section>
  </div>

<script>
const sectionNames=["Overview","CF Analysis","Thematic Analysis","Project Details"];
let rows=[];
const requiredCols=["Country","Plan name","Plan start date","Plan end date","Plan ID","Strategic priority code","Strategic priority","Outcome code","Outcome","Output code","Output","Sub-Output code","Sub-Output","ID","Description","Start date","End date","Status","Joint Programmes / Initiatives names","Joint Programmes / Initiatives types","Agency abbreviations","Agencies","Contributing partners","Implementation partners","SDG Targets","SDG Goals","Geography","QCPR function","Humanitarian marker","Gender marker","Human rights marker","Sustaining peace marker","LNOB groups targeted","Focal users","Non Monetary Assistance","Total required resources","Total available resources","Total expenditure resources","2023 Required","2023 Available","2023 Expenditure","2024 Required","2024 Available","2024 Expenditure","2025 Required","2025 Available","2025 Expenditure","2026 Required","2026 Available","2026 Expenditure","2027 Required","2027 Available","2027 Expenditure"];

function parseCSV(text){
  const clean=text.replace(/^\uFEFF/, "");
  const lines=clean.split(/\r?\n/).filter(Boolean); if(!lines.length) return [];
  const parseLine=(line)=>{
    const out=[]; let cur=""; let q=false;
    for(let i=0;i<line.length;i++){ const ch=line[i];
      if(ch==='"'){ if(q && line[i+1]==='"'){cur+='"'; i++;} else {q=!q;} }
      else if(ch===',' && !q){ out.push(cur); cur=""; }
      else { cur+=ch; }
    }
    out.push(cur);
    return out.map(v=>v.trim());
  };
  const headers=parseLine(lines[0]);
  return lines.slice(1).map(l=>{const c=parseLine(l); const o={}; headers.forEach((h,i)=>o[h]=(c[i]||'').trim()); return o;});
}
function toNum(v){ return Number(String(v||'').replace(/[^\d.-]/g,''))||0 }
function money(n){ return new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n) }
function uniq(a){return [...new Set(a.filter(Boolean))]}
function filtered(){
  return rows.filter(r=> (!country.value||r.Country===country.value) && (!status.value||r.Status===status.value) && (!agency.value||r.Agencies===agency.value));
}

function scopedFilterOptions(){
  const byCountry=rows.filter(r=>!country.value||r.Country===country.value);
  status.innerHTML=`<option value=''>All status</option>${uniq(byCountry.map(r=>r.Status)).map(v=>`<option ${status.value===v?"selected":""}>${v}</option>`).join('')}`;
  const byCountryStatus=rows.filter(r=>(!country.value||r.Country===country.value)&&(!status.value||r.Status===status.value));
  agency.innerHTML=`<option value=''>All agencies</option>${uniq(byCountryStatus.map(r=>r.Agencies)).map(v=>`<option ${agency.value===v?"selected":""}>${v}</option>`).join('')}`;
}
function currentYearCols(y){ return [`${y} Required`,`${y} Available`,`${y} Expenditure`]; }

function drawMetrics(data){
  const y=year.value||'2026';
  const [rq,av,ex]=currentYearCols(y);
  const req=data.reduce((s,r)=>s+toNum(r[rq]||r["Total required resources"]),0);
  const ava=data.reduce((s,r)=>s+toNum(r[av]||r["Total available resources"]),0);
  const exp=data.reduce((s,r)=>s+toNum(r[ex]||r["Total expenditure resources"]),0);
  const gap=req-ava;
  metrics.innerHTML=`<div class='metric'><h4>Required Funding</h4><div class='v'>$${money(req)}</div></div>
  <div class='metric'><h4>Available</h4><div class='v'>$${money(ava)}</div></div>
  <div class='metric'><h4>Expenditure</h4><div class='v'>$${money(exp)}</div></div>
  <div class='metric'><h4>Funding Gap</h4><div class='v' style='color:${gap>0?"var(--bad)":"var(--ok)"}'>$${money(gap)}</div></div>`;
}
function table(el,cols,data){ el.innerHTML=`<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${data.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody>`; }
function render(){
  const data=filtered(); drawMetrics(data);
  const y=year.value||'2026'; const [rq,av,ex]=currentYearCols(y);
  const byCountry={}; data.forEach(r=>{ const k=r.Country||'N/A'; byCountry[k]=byCountry[k]||{Country:k,Required:0,Available:0,Expenditure:0}; byCountry[k].Required+=toNum(r[rq]||r['Total required resources']); byCountry[k].Available+=toNum(r[av]||r['Total available resources']); byCountry[k].Expenditure+=toNum(r[ex]||r['Total expenditure resources']); });
  const overview=Object.values(byCountry).map(r=>({...r,"Funding gap":r.Required-r.Available,Required:money(r.Required),Available:money(r.Available),Expenditure:money(r.Expenditure),"Funding gap":money(r["Funding gap"])}));
  table(tableOverview,["Country","Required","Available","Expenditure","Funding gap"],overview);

  const cf=data.map(r=>({"Joint Programmes":r["Joint Programmes / Initiatives names"],"Type":r["Joint Programmes / Initiatives types"],"Status":r.Status,"SDG":r["SDG Goals"],"Agency":r.Agencies}));
  table(tableCF,["Joint Programmes","Type","Status","SDG","Agency"],cf);

  const them=data.map(r=>({"Strategic Priority":r["Strategic priority"],"Outcome":r.Outcome,"Output":r.Output,"QCPR":r["QCPR function"],"Humanitarian":r["Humanitarian marker"],"Gender":r["Gender marker"],"Human Rights":r["Human rights marker"],"Peace":r["Sustaining peace marker"],"LNOB":r["LNOB groups targeted"]}));
  table(tableTheme,["Strategic Priority","Outcome","Output","QCPR","Humanitarian","Gender","Human Rights","Peace","LNOB"],them);

  table(tableProject,["Country","Plan name","Plan ID","Sub-Output","Description","Start date","End date","Status","Agencies","Contributing partners","Implementation partners","Focal users"],data);
  meta.textContent=`${new Date().toLocaleString()} · ${data.length} records`;
}
function buildFilters(){
  filters.style.display="grid";
  filterHint.textContent="Select options to refine the four sections.";
  country.innerHTML=`<option value=''>All countries</option>${uniq(rows.map(r=>r.Country)).map(v=>`<option>${v}</option>`).join('')}`;
  year.innerHTML=`<option>2023</option><option>2024</option><option>2025</option><option selected>2026</option><option>2027</option>`;
  status.value=""; agency.value="";
  scopedFilterOptions();
}

document.getElementById('tabs').innerHTML=sectionNames.map((s,i)=>`<button class='tab ${i===0?'active':''}' data-tab='${s}'>${s}</button>`).join('');
addEventListener('click',e=>{ if(e.target.matches('.tab')){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); e.target.classList.add('active'); document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.panel===e.target.dataset.tab)); }});
country.addEventListener('change',()=>{status.value="";agency.value="";scopedFilterOptions();render();});
status.addEventListener('change',()=>{agency.value="";scopedFilterOptions();render();});
[year,agency].forEach(el=>el.addEventListener('change',render));
upload.addEventListener('change',async e=>{ const f=e.target.files[0]; if(!f)return; const text=await f.text(); rows=parseCSV(text); if(!rows.length){ alert("No rows found in CSV."); return; } const missing=requiredCols.filter(c=>!(rows[0]&&c in rows[0])); if(missing.length) alert('Missing expected columns: '+missing.slice(0,8).join(', ')+'...'); buildFilters(); render(); });
reset.onclick=()=>{ country.value=""; year.value="2026"; status.value=""; agency.value=""; scopedFilterOptions(); render(); };
download.onclick=()=>{ const data=filtered(); if(!data.length)return; const h=Object.keys(data[0]); const csv=[h.join(',')].concat(data.map(r=>h.map(k=>`"${(r[k]||'').replaceAll('"','""')}"`).join(','))).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='filtered_cf_data.csv'; a.click(); };
</script>
</body>
</html>
